name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    if: ${{ always() && (needs.release-please.outputs.release_created || startsWith(github.ref, 'refs/tags/v')) }}
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest && npm --version

      - run: npm ci || npm install
      - run: npm run build

      - name: Publish to npm (OIDC trusted publisher - release.yml)
        run: npm publish --provenance --access public

      - run: |
          sleep 5
          npm view opencode-autonomy version
