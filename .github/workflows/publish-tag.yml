name: Publish Tag

# Fallback: publish when you manually push a version tag v*
# e.g. npm version patch && git push --follow-tags
# Also works if release-please is disabled.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.1) — only used for manual dispatch, tag is created from package.json'
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm ci || npm install
      - run: npm run build

      - name: Publish to npm (OIDC or NPM_TOKEN)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify
        run: |
          sleep 5
          npm view opencode-autonomy version
