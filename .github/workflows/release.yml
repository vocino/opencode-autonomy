name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  publish:
    if: ${{ always() && (needs.release-please.outputs.release_created || startsWith(github.ref, 'refs/tags/v')) }}
    needs: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: npm

      - run: npm ci || npm install
      - run: npm run build

      - name: Publish to npm (OIDC trusted publisher)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Configure ONE trusted publisher at https://www.npmjs.com/package/opencode-autonomy/access:
          # Repo: vocino/opencode-autonomy, Workflow: release.yml
          # That's enough for both auto (release-please) and manual v* tags.

      - run: |
          sleep 5
          npm view opencode-autonomy version
